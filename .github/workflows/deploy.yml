name: Deploy to FTP

on:
  push:
    branches: [ feature/telegram-booking-app-initial ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    
    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@4.0.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: /www/bookingfortomorrow.ru/claude_app/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/__pycache__/**
          .env
